<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NULL</title>
    <link rel="stylesheet" href="static/styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" class="logo">NULL</a>
            <div class="nav-menu">
                <a href="about.html">Sobre Mí</a>
                <a href="skills.html">Habilidades</a>
                <a href="projects.html">Proyectos</a>
                <a href="contact.html">Contacto</a>
                <a href="#" onclick="showLogin()" class="login-btn">INICIAR SESIÓN</a>
            </div>
        </div>
    </nav>

    <!-- Hero con partículas -->
    <header class="hero">
        <div class="particles" id="particles"></div>
        
        <div class="hero-content">
            <h1 class="main-title">NULL</h1>
            <p class="subtitle">CODE IS MY WEAPON</p>
            
            <div class="hero-buttons">
                <a href="about.html" class="btn btn-primary">CONÓCEME</a>
                <a href="projects.html" class="btn btn-secondary">VER PROYECTOS</a>
            </div>
        </div>
    </header>

    <footer style="text-align:center; padding:60px; color:#555;">
        © 2026 NULL • Hacking the Future
    </footer>

    <!-- LOGIN MODAL -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="hideLogin()">×</span>
            <div class="modal-header">
                <h2>INICIAR SESIÓN</h2>
                <p class="modal-subtitle">Accede al sistema Null</p>
            </div>
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <input type="text" placeholder="Usuario o Email" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Contraseña" required>
                </div>
                <button type="submit" id="loginBtn" class="btn btn-primary full">ENTRAR AL SISTEMA</button>
            </form>

            <div class="options">
                <label><input type="checkbox"> Recordarme</label>
                <a href="#" onclick="forgotPassword()" class="forgot-link">¿Olvidaste tu contraseña?</a>
            </div>

            <div style="margin-top: 25px; padding-top: 20px; border-top: 1px solid #333;">
                <a href="#" onclick="requestAccess()" class="request-link">
                    ¿Quieres pedir acceso al sistema?
                </a>
            </div>
        </div>
    </div>

    <script>
        // === PARTICLES ===
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 80; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 4 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}vw`;
                particle.style.bottom = `-${Math.random() * 50}px`;
                particle.style.animationDuration = `${Math.random() * 20 + 15}s`;
                particle.style.animationDelay = `-${Math.random() * 20}s`;
                particle.style.opacity = Math.random() * 0.4 + 0.15;
                
                particlesContainer.appendChild(particle);
            }
        }

        // === MODAL FUNCTIONS ===
        function showLogin() {
            document.getElementById('loginModal').style.display = 'flex';
        }

        function hideLogin() {
            document.getElementById('loginModal').style.display = 'none';
        }

        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.textContent = "VERIFICANDO...";
            setTimeout(() => {
                alert("¡Acceso concedido! (Demo)");
                hideLogin();
            }, 1500);
        }

        function forgotPassword() {
            alert("En un sistema real se enviaría un enlace de recuperación.");
        }

        function requestAccess() {
            hideLogin();
            setTimeout(() => {
                alert("Solicitud de acceso recibida.\n\nTe contactaremos pronto para darte acceso.");
            }, 400);
        }

        // Inicializar partículas al cargar la página
        window.onload = createParticles;
    </script>
</body>
</html>
